name = "github-repo-analyser"
main = "src/worker.ts"
compatibility_date = "2024-05-02"

compatibility_flags = [
  "nodejs_compat",
]

[assets]
directory = "./public"

[build]
command = "npx tsc --noEmit && npx esbuild src/worker.ts --bundle --outfile=dist/worker.js --format=esm --target=es2022 --platform=browser"

[vars]
LANGUAGE_REPO_LIMIT = "8"

# Secrets (set via wrangler secret put):
#   GITHUB_PAT
#   GROQ_API_KEY
